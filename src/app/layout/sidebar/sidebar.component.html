<nav class="w-64 bg-gray-100 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 min-h-screen p-4 flex flex-col justify-between transition-colors duration-300">
  <ul class="space-y-2">
    <li *ngFor="let item of menu">
      <a
        [routerLink]="item.route"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: item.exact || false }"
        class="flex items-center gap-3 p-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-gray-700 transition-all duration-200 ease-in-out"
      >
        <span class="text-xl">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    </li>
  </ul>

  <div class="space-y-1">
    <button
      (click)="themeService.toggle()"
      class="flex items-center gap-3 p-3 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all duration-200 ease-in-out w-full"
    >
      <span class="text-xl">{{ themeService.isDark ? '☀️' : '🌙' }}</span>
      <span class="text-sm font-medium">{{ themeService.isDark ? 'Modo claro' : 'Modo oscuro' }}</span>
    </button>

    <button
      (click)="logout()"
      class="flex items-center gap-3 p-3 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-600 dark:hover:text-red-400 transition-all duration-200 ease-in-out w-full"
    >
      <span class="text-xl">🚪</span>
      <span class="text-sm font-medium">Cerrar sesión</span>
    </button>
  </div>
</nav>
